<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            background: transparent !important;
            background-color: transparent !important;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100px;
            overflow: hidden;
            font-family: 'Courier Prime', 'Courier New', Courier, monospace;
        }

        ul {
            list-style: none;
            display: flex;
            gap: 40px;
        }

        a {
            text-decoration: none;
            color: #2c2c2c;
            font-weight: 700;
            font-size: 1.1rem;
            padding-bottom: 5px;
            border-bottom: 3px solid transparent;
            transition: color 0.3s, border-color 0.3s;
            background: transparent;
        }

        a:hover {
            color: #b91d1d;
        }

        a.active {
            color: #b91d1d !important;
            border-bottom: 3px solid #b91d1d !important;
        }
    </style>
</head>
<body>
    <ul id="menuList">
        <li><a href="introduccion.html" target="contenido" onclick="setActive(this)" class="active">Home</a></li>
        <li><a href="biografia.html" target="contenido" onclick="setActive(this)">Biografía</a></li>
        <li><a href="discografia.html" target="contenido" onclick="setActive(this)">Discografía</a></li>
        <li><a href="poetica.html" target="contenido" onclick="setActive(this)">Poética</a></li>
        <li><a href="acerca_de.html" target="contenido" onclick="setActive(this)">Equipo</a></li>
    </ul>

    <script>
        function setActive(element) {
            document.querySelectorAll('a').forEach(link => link.classList.remove('active'));
            element.classList.add('active');
        }
    </script>
</body>
</html>
