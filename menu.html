<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    const SUPABASE_URL = 'https://mgbzmaiiplcvujzcqxan.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_OFv41HzOqNPVwWlmZHNOUQ_ojBYoFO0';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function setActive(element) {
        document.querySelectorAll('a').forEach(link => link.classList.remove('active'));
        element.classList.add('active');
    }

    // Monitorear la sesión
    supabase.auth.onAuthStateChange((event, session) => {
        const btn = document.getElementById('authBtn');
        const menuList = document.getElementById('menuList');
        
        if (session) {
            btn.innerHTML = "Logout";
            btn.style.backgroundColor = "#b91d1d";
            btn.style.color = "#ffffff";
            if(menuList) menuList.style.pointerEvents = "auto"; // Activa los clics
        } else {
            btn.innerHTML = "Login Google";
            btn.style.backgroundColor = "#ffffff";
            btn.style.color = "#1a1a1a";
            if(menuList) menuList.style.pointerEvents = "none"; // Bloquea los clics si no hay login
        }
    });

    async function handleAuth() {
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
            await supabase.auth.signOut();
            window.parent.location.reload(); // Recarga todo el sitio al salir
        } else {
            await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: 'https://maferruano.github.io/Proyecto_ISDC/'
                }
            });
        }
    }
</script>
