<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background: transparent; /* Totalmente transparente para ver el fondo */
            font-family: 'Montserrat', sans-serif; /* Más moderno como tu imagen */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center; /* Centra el menú como en la referencia */
            align-items: center;
            height: 80px;
            overflow: hidden;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            gap: 40px; /* Espacio entre palabras */
        }

        a {
            text-decoration: none;
            color: #000; /* Texto negro */
            font-weight: 700;
            font-size: 1.1rem;
            padding-bottom: 5px;
            transition: 0.3s;
            position: relative;
        }

        /* La línea debajo al pasar el mouse */
        a:hover {
            color: #b91d1d;
        }

        /* CLASE PARA LA PÁGINA SELECCIONADA (Como tu imagen de Search) */
        .active {
            border-bottom: 3px solid #000; /* Línea negra gruesa abajo */
            padding-bottom: 2px;
        }

        /* Título Arjona opcional a la izquierda si lo quieres mantener */
        .brand {
            position: absolute;
            left: 40px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="brand">ARJONA</div>

    <ul id="menuList">
        <li><a href="introduccion.html" target="contenido" onclick="setActive(this)" class="active">Home</a></li>
        <li><a href="biografia.html" target="contenido" onclick="setActive(this)">Biografía</a></li>
        <li><a href="discografia.html" target="contenido" onclick="setActive(this)">Discografía</a></li>
        <li><a href="poetica.html" target="contenido" onclick="setActive(this)">Poética</a></li>
        <li><a href="acerca_de.html" target="contenido" onclick="setActive(this)">Equipo</a></li>
    </ul>

    <script>
        function setActive(element) {
            const links = document.querySelectorAll('a');
            links.forEach(link => link.classList.remove('active'));
            element.classList.add('active');
        }
    </script>
</body>
</html>
