<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Manteniendo el codigo CSS */
            background-color: #1a1a1a !important; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100px; /* Ajustado al tamaño de la fila en el index */
            overflow: hidden;
            /* Misma fuente que las otras paginas */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Linea roja inferior para conectar con el diseño de las paginas */
            border-bottom: 5px solid #b91d1d; 
            /* NOTA: Relative para anclar el botón de usuario a la derecha sin arruinar mi centrado */
            position: relative;
        }

        ul {
            list-style: none;
            display: flex;
            gap: 30px;
        }

        a {
            text-decoration: none;
            color: #ffffff; /* Texto blanco sobre fondo oscuro */
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 10px 20px;
            border-radius: 4px;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        /* Efecto hover: se pone rojo */
        a:hover {
            color: #ffffff;
            background-color: #b91d1d;
            transform: scale(1.05);
        }

        /* Clase activa: resalta en que pagina se esta */
        a.active {
            background-color: #b91d1d !important;
            color: #ffffff !important;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* NOTA: Estilos del menú de usuario a la derecha */
        .user-menu-container {
            position: absolute;
            right: 40px;
        }

        .vector-avatar-btn {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            padding: 5px;
            transition: transform 0.2s ease;
        }

        .vector-avatar-btn:hover {
            transform: scale(1.1);
        }

        .vector-avatar-btn:hover svg path {
            fill: #ffffff; /* Se pone blanco al pasar el mouse */
        }

        /* NOTA: El recuadro flotante para cerrar sesión */
        .dropdown-box {
            display: none;
            position: absolute;
            right: 0;
            top: 50px;
            background-color: #3d3d3d;
            min-width: 150px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.5);
            border-radius: 4px;
            border-top: 3px solid #b91d1d;
            z-index: 99999;
        }

        .dropdown-box.show {
            display: block;
        }

        .dropdown-box button {
            color: #ffffff;
            background: none;
            border: none;
            padding: 14px 16px;
            width: 100%;
            text-align: left;
            font-weight: bold;
            font-size: 0.85rem;
            text-transform: uppercase;
            cursor: pointer;
            font-family: inherit;
        }

        .dropdown-box button:hover {
            background-color: #b91d1d;
        }
    </style>
</head>
<body>
    <ul id="menuList">
        <li><a href="introduccion.html" target="contenido" onclick="setActive(this)" class="active">Home</a></li>
        <li><a href="biografia.html" target="contenido" onclick="setActive(this)">Biografía</a></li>
        <li><a href="discografia.html" target="contenido" onclick="setActive(this)">Discografía</a></li>
        <li><a href="galeria.html" target="contenido" onclick="setActive(this)">Galería</a></li>
        <li><a href="poetica.html" target="contenido" onclick="setActive(this)">Poética</a></li>
        <li><a href="equipo.html" target="contenido" onclick="setActive(this)">Equipo</a></li>
    </ul>

    <div class="user-menu-container">
        <button class="vector-avatar-btn" onclick="toggleMenu(event)">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 12C14.21 12 16 10.21 16 8C16 5.79 14.21 4 12 4C9.79 4 8 5.79 8 8C8 10.21 9.79 12 12 12ZM12 14C9.33 14 4 15.34 4 18V20H20V18C20 15.34 14.67 14 12 14Z" fill="#b91d1d"/>
            </svg>
        </button>
        <div id="dropdownMenu" class="dropdown-box">
            <button onclick="logout()">Cerrar Sesión</button>
        </div>
    </div>

    <script>
        // NOTA: Cambié el nombre a clienteSupabase para que no choque con la librería y rompa el código
        const SUPABASE_URL = 'https://mgbzmaiiplcvujzcqxan.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_OFv41HzOqNPVwWlmZHNOUQ_ojBYoFO0';
        const clienteSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function setActive(element) {
            // NOTA: Quita lo rojo de todos y se lo pone al que le di clic
            document.querySelectorAll('a').forEach(link => link.classList.remove('active'));
            element.classList.add('active');
        }

        function toggleMenu(event) {
            event.stopPropagation();
            document.getElementById("dropdownMenu").classList.toggle("show");
        }

        window.onclick = function(event) {
            if (!event.target.closest('.vector-avatar-btn')) {
                var dropdown = document.getElementById("dropdownMenu");
                if (dropdown.classList.contains('show')) {
                    dropdown.classList.remove('show');
                }
            }
        }

        async function logout() {
            await clienteSupabase.auth.signOut();
            window.top.location.href = 'index.html'; 
        }
    </script>
</body>
</html>
