<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Menú | Ricardo Arjona Project</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Manteniendo tu CSS original intacto */
            background-color: #1a1a1a !important; 
            display: flex;
            justify-content: space-between; 
            align-items: center;
            padding: 0 40px;
            height: 100px; 
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            border-bottom: 5px solid #b91d1d; 
        }

        .spacer { width: 140px; }

        ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        a {
            text-decoration: none;
            color: #ffffff; 
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 10px 15px;
            border-radius: 4px;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        /* Tus efectos Hover y Activo originales */
        a:hover {
            color: #ffffff;
            background-color: #b91d1d;
            transform: scale(1.05);
        }

        a.active {
            background-color: #b91d1d !important;
            color: #ffffff !important;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Estilo para tu botón de Google */
        .btn-google {
            background-color: #ffffff;
            color: #1a1a1a;
            border: none;
            padding: 10px 18px;
            font-weight: bold;
            font-size: 0.85rem;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            width: 140px;
            text-align: center;
        }

        .btn-google:hover {
            background-color: #b91d1d;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div style="color: #b91d1d; font-weight: bold; font-size: 1.2rem; letter-spacing: 2px;">ARJONA</div>

    <ul id="menuList">
        <li><a href="introduccion.html" target="contenido" onclick="setActive(this)" class="active">Home</a></li>
        <li><a href="biografia.html" target="contenido" onclick="setActive(this)">Biografía</a></li>
        <li><a href="discografia.html" target="contenido" onclick="setActive(this)">Discografía</a></li>
        <li><a href="galeria.html" target="contenido" onclick="setActive(this)">Galería</a></li>
        <li><a href="poetica.html" target="contenido" onclick="setActive(this)">Poética</a></li>
        <li><a href="equipo.html" target="contenido" onclick="setActive(this)">Equipo</a></li>
    </ul>

    <button class="btn-google" id="authBtn" onclick="handleAuth()">Login Google</button>

    <script>
        const SUPABASE_URL = 'https://mgbzmaiiplcvujzcqxan.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_OFv41HzOqNPVwWlmZHNOUQ_ojBYoFO0';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function setActive(element) {
            document.querySelectorAll('a').forEach(link => link.classList.remove('active'));
            element.classList.add('active');
        }

        // Monitoreo del estado de la sesión en tiempo real
        supabase.auth.onAuthStateChange((event, session) => {
            const btn = document.getElementById('authBtn');
            const menuList = document.getElementById('menuList');
            
            if (session) {
                btn.innerHTML = "Logout";
                btn.style.backgroundColor = "#b91d1d";
                btn.style.color = "#ffffff";
                if(menuList) menuList.style.pointerEvents = "auto"; // Permite navegar si está logueado
            } else {
                btn.innerHTML = "Login Google";
                btn.style.backgroundColor = "#ffffff";
                btn.style.color = "#1a1a1a";
                if(menuList) menuList.style.pointerEvents = "none"; // Bloquea los clics si no hay sesión
            }
        });

        async function handleAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            
            if (session) {
                // Si el usuario presiona Logout, cierra sesión y recarga la app completa
                await supabase.auth.signOut();
                window.parent.location.reload();
            } else {
                // Si presiona Login, inicia el flujo seguro con Google
                await supabase.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: 'https://maferruano.github.io/Proyecto_ISDC/'
                    }
                });
            }
        }
    </script>
</body>
</html>
