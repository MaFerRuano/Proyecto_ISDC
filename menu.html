<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background: transparent !important; /* Forzamos transparencia total */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center; /* Centra las opciones en la pantalla */
            align-items: center;
            height: 100px;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            gap: 40px; /* Espacio entre cada palabra */
        }

        a {
            text-decoration: none;
            color: #333; /* Color de las palabras */
            font-weight: 700;
            font-size: 1.1rem;
            padding-bottom: 5px;
            transition: 0.3s;
            border-bottom: 3px solid transparent; /* Línea invisible por defecto */
        }

        /* Al pasar el mouse, se pone el color rojo de Arjona */
        a:hover {
            color: #b91d1d;
        }

        /* Solo la opción seleccionada tendrá la línea negra debajo (estilo Search) */
        .active {
            border-bottom: 3px solid #000 !important;
            color: #000;
        }
    </style>
</head>
<body>

    <ul id="menuList">
        <li><a href="introduccion.html" target="contenido" onclick="setActive(this)" class="active">Home</a></li>
        <li><a href="biografia.html" target="contenido" onclick="setActive(this)">Biografía</a></li>
        <li><a href="discografia.html" target="contenido" onclick="setActive(this)">Discografía</a></li>
        <li><a href="poetica.html" target="contenido" onclick="setActive(this)">Poética</a></li>
        <li><a href="acerca_de.html" target="contenido" onclick="setActive(this)">Equipo</a></li>
    </ul>

    <script>
        function setActive(element) {
            // Quitamos la línea de todos los demás
            const links = document.querySelectorAll('a');
            links.forEach(link => link.classList.remove('active'));
            
            // Se la ponemos solo al que presionamos
            element.classList.add('active');
        }
    </script>
</body>
</html>
