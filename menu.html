<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Menú | Ricardo Arjona Project</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a1a1a !important; 
            display: flex;
            /* Alinea los enlaces a la izquierda y el perfil a la derecha de forma limpia */
            justify-content: space-between; 
            align-items: center;
            padding: 0 40px;
            height: 100px; 
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            border-bottom: 5px solid #b91d1d; 
        }

        ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        a {
            text-decoration: none;
            color: #ffffff; 
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 10px 15px;
            border-radius: 4px;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        /* Efecto hover: se pone rojo */
        a:hover {
            color: #ffffff;
            background-color: #b91d1d;
            transform: scale(1.05);
        }

        /* Clase activa para mantener el color en la página actual */
        a.active {
            background-color: #b91d1d !important;
            color: #ffffff !important;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* CONTENEDOR DEL MENÚ DE USUARIO DESPLEGABLE */
        .user-dropdown {
            position: relative;
            display: inline-block;
        }

        /* El círculo del avatar */
        .avatar-btn {
            background-color: #ffffff;
            color: #1a1a1a;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            border: none;
        }

        .avatar-btn:hover {
            background-color: #b91d1d;
            color: #ffffff;
        }

        /* La cajita flotante con la opción de cerrar sesión */
        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            top: 50px;
            background-color: #3d3d3d;
            min-width: 150px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.5);
            border-radius: 4px;
            border-top: 3px solid #b91d1d;
            z-index: 99999;
        }

        /* Botón interno de cerrar sesión */
        .dropdown-content button {
            color: #ffffff;
            background: none;
            border: none;
            padding: 14px 16px;
            text-decoration: none;
            display: block;
            width: 100%;
            text-align: left;
            font-weight: bold;
            font-size: 0.85rem;
            text-transform: uppercase;
            cursor: pointer;
            font-family: inherit;
            transition: background-color 0.2s;
        }

        .dropdown-content button:hover {
            background-color: #b91d1d;
        }
    </style>
</head>
<body>

    <ul id="menuList">
        <li><a href="introduccion.html" target="contenido" onclick="setActive('home')" id="nav-home">Home</a></li>
        <li><a href="biografia.html" target="contenido" onclick="setActive('bio')" id="nav-bio">Biografía</a></li>
        <li><a href="discografia.html" target="contenido" onclick="setActive('disco')" id="nav-disco">Discografía</a></li>
        <li><a href="galeria.html" target="contenido" onclick="setActive('galeria')" id="nav-galeria">Galería</a></li>
        <li><a href="poetica.html" target="contenido" onclick="setActive('poetica')" id="nav-poetica">Poética</a></li>
        <li><a href="equipo.html" target="contenido" onclick="setActive('equipo')" id="nav-equipo">Equipo</a></li>
    </ul>

    <div class="user-dropdown">
        <button class="avatar-btn" id="avatarClick">👤</button>
        <div id="myDropdown" class="dropdown-content">
            <button onclick="logout()">Cerrar Sesión</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://mgbzmaiiplcvujzcqxan.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_OFv41HzOqNPVwWlmZHNOUQ_ojBYoFO0';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // CONTROL DE PÁGINA SELECCIONADA (Mantiene el foco rojo en la página activa real)
        function updateActiveLink() {
            // Remueve la clase activa de todos los enlaces
            document.querySelectorAll('#menuList a').forEach(link => link.classList.remove('active'));
            
            // Revisa qué página está guardada en la memoria del navegador
            const currentPage = localStorage.getItem('activeNav') || 'home';
            const activeElement = document.getElementById('nav-' + currentPage);
            
            if (activeElement) {
                activeElement.classList.add('active');
            }
        }

        function setActive(pageName) {
            localStorage.setItem('activeNav', pageName);
            updateActiveLink();
        }

        // Ejecuta la comprobación visual al cargar la barra de menú
        document.addEventListener("DOMContentLoaded", updateActiveLink);

        // INTERACCIÓN DEL DROPDOWN COREGIDA
        const avatarBtn = document.getElementById('avatarClick');
        const dropdownMenu = document.getElementById('myDropdown');

        avatarBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // Evita que el clic se pierda en los marcos
            if (dropdownMenu.style.display === 'block') {
                dropdownMenu.style.display = 'none';
            } else {
                dropdownMenu.style.display = 'block';
            }
        });

        // Cierra el menú flotante si hacen clic en cualquier otra parte del menú
        document.addEventListener('click', () => {
            dropdownMenu.style.display = 'none';
        });

        // FUNCIÓN DE SALIDA DEFINITIVA
        async function logout() {
            localStorage.removeItem('activeNav'); // Limpia la memoria del menú al salir
            await supabase.auth.signOut();
            window.top.location.href = 'index.html'; 
        }
    </script>
</body>
</html>
