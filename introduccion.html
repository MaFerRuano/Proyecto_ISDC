<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        /* ... (mantén el resto de tus estilos anteriores) ... */

        .banner-rasgado {
            width: 100%;
            min-height: 280px;
            background-image: url('papel-rasgado.png'); 
            background-size: 100% 100%;
            background-repeat: no-repeat;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 80px;
            box-sizing: border-box;
            position: relative; /* Para posicionar el tape */
            margin-bottom: 40px;
        }

        /* CONTENEDOR DE LA FOTO PARA EL TAPE */
        .foto-pegada-container {
            position: relative;
            display: inline-block;
            transform: rotate(5deg); /* Inclinación de la foto */
            transition: 0.3s;
        }

        .arjona-png {
            height: 220px; /* Tamaño más pequeño como pediste */
            display: block;
            filter: sepia(0.2) contrast(1.1) drop-shadow(5px 5px 10px rgba(0,0,0,0.2));
        }

        /* EL TAPE (CINTA ADHESIVA) */
        .foto-pegada-container::before {
            content: "";
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%) rotate(-5deg);
            width: 80px;
            height: 30px;
            background-color: rgba(255, 255, 255, 0.4); /* Color blanco translúcido */
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            backdrop-filter: blur(2px); /* Efecto de cinta vieja */
            border-left: 2px solid rgba(255,255,255,0.1);
            border-right: 2px solid rgba(255,255,255,0.1);
            z-index: 20;
        }

        /* Efecto de bordes rasgados en el tape */
        .foto-pegada-container::after {
            content: "";
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%) rotate(-5deg);
            width: 80px;
            height: 30px;
            background-image: radial-gradient(circle, transparent 50%, rgba(255,255,255,0.1) 50%);
            background-size: 4px 4px;
            z-index: 21;
            opacity: 0.3;
            pointer-events: none;
        }

        .firma {
            font-family: 'Homemade Apple', cursive;
            font-size: 3rem;
            color: #b91d1d;
            margin: 0;
        }

        /* ... (restante de la grid e info-box) ... */
    </style>
</head>
<body>

    <div class="banner-rasgado">
        <div class="firma-container">
            <h1 class="firma">Ricardo Arjona</h1>
            <p class="cita-header">"Si el pasado te enseña, bienvenido sea..."</p>
        </div>

        <div class="foto-pegada-container">
            <img src="arjona-intro.png" class="arjona-png" alt="Arjona">
        </div>
    </div>

    </body>
</html>
