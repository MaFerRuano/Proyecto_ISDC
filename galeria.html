        h1 { color: #b91d1d; text-transform: uppercase; margin-bottom: 40px; }
    </style>
</head>
<body>
    <script>
        const supabase = supabase.createClient('https://mgbzmaiiplcvujzcqxan.supabase.co', 'sb_publishable_OFv41HzOqNPVwWlmZHNOUQ_ojBYoFO0');
        supabase.auth.getSession().then(({ data: { session } }) => { if (!session) window.parent.location.href = 'https://maferruano.github.io/Proyecto_ISDC/'; });

    <h1>Galería Visual</h1>
    <div class="grid">
        <div class="img-card"><img src="Arjona_Antigua.png"><p>Antigua Guatemala</p></div>
