<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ricardo Arjona - Proyecto Oficial</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Estilos para la pantalla de Login Inicial */
        html, body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: #2c2c2c;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .login-box {
            background-color: #3d3d3d;
            padding: 50px 40px;
            border-radius: 4px;
            border-top: 10px solid #b91d1d;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.2);
            max-width: 450px;
            width: 100%;
            margin: 20px;
        }

        h1 {
            color: #ffffff;
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0 0 10px 0;
        }

        p {
            color: #b91d1d;
            font-weight: bold;
            font-size: 1.1rem;
            text-transform: uppercase;
            margin: 0 0 35px 0;
        }

        .btn-google {
            background-color: #ffffff;
            color: #1a1a1a;
            border: none;
            padding: 14px 25px;
            font-weight: bold;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn-google:hover {
            background-color: #b91d1d;
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(185, 29, 29, 0.3);
        }
    </style>
</head>
<body>

    <div id="loginScreen" style="display: none;">
        <div class="login-box">
            <h1>Bienvenido</h1>
            <p>Al Mundo de Ricardo Arjona</p>
            <button class="btn-google" onclick="login()">Iniciar Sesión con Google</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://mgbzmaiiplcvujzcqxan.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_OFv41HzOqNPVwWlmZHNOUQ_ojBYoFO0';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Evaluamos la sesión inmediatamente al abrir la página
        supabase.auth.getSession().then(({ data: { session } }) => {
            renderPage(session);
        });

        function renderPage(session) {
            if (session) {
                // SI ESTÁ LOGUEADO: Reemplazamos la pantalla por tus marcos originales
                document.open();
                document.write(`
                    <frameset rows="120, *" border="0" frameborder="0" framespacing="0">
                        <frame src="menu.html" name="menu" noresize scrolling="no">
                        <frame src="introduccion.html" name="contenido">
                    </frameset>
                `);
                document.close();
            } else {
                // SI NO ESTÁ LOGUEADO: Hacemos visible el cuadro de login
                document.getElementById('loginScreen').style.display = 'block';
            }
        }

        async function login() {
            await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: 'https://maferruano.github.io/Proyecto_ISDC/'
                }
            });
        }
    </script>
</body>
</html>
